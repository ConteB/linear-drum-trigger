<html>
<head>
<style>
  :root {
    --bg-main: #050504; 
    --bg-plugin: #1a1a18;
    --panel-dark: #121211;
    --wood: #361e0f;
    --nixie: #ff7700;
    --crt: #33ff33;
    --label: #444;
  }

  body { background: var(--bg-main); color: #888; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; padding: 40px; display: flex; flex-direction: column; align-items: center; }
  
  .chassis { display: flex; box-shadow: 0 120px 240px rgba(0,0,0,1); border-radius: 18px; overflow: hidden; border: 1px solid #000; }
  
  .cheek { width: 42px; height: 840px; background: linear-gradient(90deg, #120a05, var(--wood) 50%, #120a05); border-radius: 18px 0 0 18px; box-shadow: inset -10px 0 30px rgba(0,0,0,0.8); }
  .cheek-right { border-radius: 0 18px 18px 0; box-shadow: inset 10px 0 30px rgba(0,0,0,0.8); }

  .window { background: #222220; width: 1140px; height: 840px; display: flex; padding: 15px; gap: 15px; box-sizing: border-box; }

  /* COLUMN LAYOUT */
  .col-analysis { flex: 2; display: flex; flex-direction: column; gap: 15px; }
  .col-command { flex: 1.1; display: flex; flex-direction: column; gap: 15px; }

  /* LEFT SIDE: CONTINUOUS FLOW */
  .scope-box { flex: 1.7; background: #000; border: 8px solid #111; border-radius: 12px; position: relative; overflow: hidden; box-shadow: inset 0 0 100px #000; }
  .scope-grid { position: absolute; inset: 0; background-image: linear-gradient(rgba(51,255,51,0.015) 1px, transparent 1px), linear-gradient(90deg, rgba(51,255,51,0.015) 1px, transparent 1px); background-size: 40px 40px; }
  
  .matrix-box { height: 300px; background: #121211; border: 4px solid #1a1a19; border-radius: 10px; display: flex; overflow: hidden; box-shadow: inset 0 0 40px #000; }

  /* RIGHT SIDE: THE TRIPLE STACK */
  .master-plate { flex: 1.5; background: var(--panel-dark); border: 1px solid #000; border-radius: 6px; padding: 25px; display: flex; flex-direction: column; position: relative; box-shadow: inset 0 2px 10px rgba(0,0,0,0.8); }
  
  .edgewise-meter { height: 50px; background: #080808; border: 2px solid #1a1a18; border-radius: 3px; position: relative; margin-bottom: 30px; overflow: hidden; }
  .meter-pointer { position: absolute; left: 75%; top: 0; bottom: 0; width: 3px; background: #ff4444; box-shadow: 0 0 15px #ff4444; }

  .knob-unit { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .knob-real { width: 55px; height: 55px; border-radius: 50%; background: radial-gradient(circle, #222, #000); border: 2px solid #000; position: relative; }
  .knob-real::after { content: ''; position: absolute; width: 3px; height: 14px; background: #eee; top: 5px; left: 26px; }

  .nixie-rack { background: #050505; border: 1px solid #111; padding: 12px; border-radius: 4px; display: flex; flex-direction: column; gap: 10px; box-shadow: inset 0 5px 20px #000; margin-top: auto; }
  .nixie-line { display: flex; justify-content: space-between; align-items: center; }
  .tube-val { font-family: 'Courier New', monospace; font-size: 16px; color: var(--nixie); text-shadow: 0 0 12px var(--nixie); }

  /* THE NEURAL SLOT (MIDDLE STACK) */
  .neural-slot { height: 70px; background: #151514; border: 1px solid #000; border-radius: 6px; display: flex; flex-direction: column; justify-content: center; padding: 0 15px; gap: 5px; box-shadow: inset 0 2px 10px #000; }
  .slot-line { display: flex; justify-content: space-between; font-size: 7px; font-weight: bold; letter-spacing: 1px; }

  /* FUTURE BOX (BOTTOM STACK) */
  .future-box { flex: 1; background: #1e1e1c; border: 1px solid #111; border-radius: 6px; padding: 20px; position: relative; display: flex; flex-direction: column; }
  .scribble-area { flex-grow: 1; border: 1px dashed rgba(255,255,255,0.02); position: relative; margin-bottom: 10px; }
  .owner-plate { background: #111; padding: 12px; border-radius: 3px; border: 1px solid #000; text-align: center; }

  /* COMMON COMPONENTS */
  .strip { flex: 1; border-right: 1px solid #000; display: flex; flex-direction: column; align-items: center; padding: 20px 0; }
  .strip.on { background: rgba(51, 255, 51, 0.02); }
  .m-track { width: 14px; height: 120px; background: #000; border: 1px solid #1a1a19; position: relative; }
  .m-fill { position: absolute; bottom: 0; width: 100%; background: #444; }
  .m-fill.active { background: #fff; box-shadow: 0 0 15px #fff; }

</style>
</head>
<body>

  <h2 style="font-size:10px; letter-spacing:10px; color:#222; margin-bottom:30px; text-transform:uppercase;">OP-NEUROTRIGGER // V19 // ASYMMETRIC PRECISION RACK</h2>

  <div class="chassis">
    <div class="cheek"></div>
    <div class="window">
      
      <!-- LEFT SIDE: ANALYSIS -->
      <div class="col-analysis">
        <div class="scope-box">
          <div class="scope-grid"></div>
          <div style="position:absolute; top:25px; left:30px; font-size:9px; color:var(--crt); opacity:0.6; letter-spacing:1px;">BUFFER_V2 // CH: SNARE</div>
          <div style="position:absolute; left:20%; top:10%; bottom:10%; width:2px; background:#fff; box-shadow:0 0 20px #fff;"></div>
        </div>
        <div class="matrix-box" id="matrix-container"></div>
      </div>

      <!-- RIGHT SIDE: THE TRIPLE STACK -->
      <div class="col-command">
        <!-- STACK 1: MASTER ENGINE -->
        <div class="master-plate">
          <div style="font-size:7px; font-weight:bold; letter-spacing:2px; color:#333; margin-bottom:10px;">NEURAL_CONFIDENCE</div>
          <div class="edgewise-meter"><div class="meter-pointer"></div></div>

          <div style="display:flex; justify-content:space-around; margin-bottom:20px;">
            <div class="knob-unit"><div class="knob-real"></div><div style="font-size:7px; font-weight:bold; color:var(--label);">SENSITIVITY</div></div>
            <div class="knob-unit"><div class="knob-real" style="transform: rotate(45deg);"></div><div style="font-size:7px; font-weight:bold; color:var(--label);">DISCRIM.</div></div>
          </div>

          <div class="nixie-rack">
            <div class="nixie-line"><span style="font-size:7px; color:#222;">MIDI_NOTE</span><span class="tube-val">38</span></div>
            <div class="nixie-line"><span style="font-size:7px; color:#222;">VELO_GAIN</span><span class="tube-val">1.15</span></div>
            <div class="nixie-line"><span style="font-size:7px; color:#222;">GATE_TIME</span><span class="tube-val">15ms</span></div>
          </div>
        </div>

        <!-- STACK 2: NEURAL SLOT -->
        <div class="neural-slot">
          <div class="slot-line"><span>MODEL_SELECT</span><span style="color:var(--nixie); text-shadow:0 0 8px var(--nixie); font-family:monospace;">TCN_GEN_II</span></div>
          <div class="slot-line"><span>LOOK-AHEAD</span><span style="color:var(--nixie); text-shadow:0 0 8px var(--nixie); font-family:monospace;">100.00ms</span></div>
        </div>

        <!-- STACK 3: FUTURE/TOOLBOX -->
        <div class="future-box">
          <div class="scribble-area"></div>
          <div class="owner-plate">
             <div style="font-size:14px; font-weight:900; color:#000; opacity:0.8; letter-spacing:1px;">MARCO ROSSI</div>
             <div style="font-size:8px; color:#000; font-weight:bold; opacity:0.6;">REF: OPX-74-LN</div>
          </div>
        </div>
      </div>

    </div>
    <div class="cheek cheek-right"></div>
  </div>

  <script>
    const labels = ['KICK', 'SNARE', 'TOM 1', 'TOM 2', 'H-HAT', 'RIDE', 'CRASH', 'SPLASH'];
    const container = document.getElementById('matrix-container');
    labels.forEach(l => {
      const active = (l === 'SNARE');
      container.innerHTML += '<div class="strip ' + (active ? 'on' : '') + '">' +
        '<div style="font-size:9px; font-weight:900; color:#222; margin-bottom:20px;">' + l + '</div>' +
        '<div class="m-track"><div class="m-fill ' + (active ? 'active' : '') + '" style="height: ' + (active ? '85' : '15') + '%;"></div></div>' +
        '<div style="width:8px; height:8px; border-radius:50%; background:' + (active ? '#fff' : '#0a0a0a') + '; margin-top:20px; border:1px solid #000;"></div>' +
        '</div>';
    });
  </script>

</body>
</html>
