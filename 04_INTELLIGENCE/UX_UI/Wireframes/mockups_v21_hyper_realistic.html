<!DOCTYPE html>
<html>
<head>
    <title>OP-NEUROTRIGGER HYPER-REALISTIC RENDER</title>
    <style>
        body { margin: 0; background: #222; overflow: hidden; font-family: 'Helvetica', sans-serif; }
        #ui-label { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); color: #666; font-size: 10px; letter-spacing: 4px; text-transform: uppercase; }
    </style>
</head>
<body>
    <div id="ui-label">Linear Division // OP-NeuroTrigger // V21 Photorealistic Prototype</div>
    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
    </script>
    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // --- SCENE SETUP ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a1a);
        scene.fog = new THREE.Fog(0x1a1a1a, 5, 20);

        const camera = new THREE.PerspectiveCamera(30, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(4, 3, 12);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.2;
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        // --- TEXTURES PROCEDURALI AVANZATE ---
        function createWoodTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 1024; canvas.height = 1024;
            const ctx = canvas.getContext('2d');
            const grad = ctx.createLinearGradient(0, 0, 1024, 0);
            grad.addColorStop(0, '#1a0d05');
            grad.addColorStop(0.5, '#3a2010');
            grad.addColorStop(1, '#1a0d05');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, 1024, 1024);
            ctx.globalAlpha = 0.15;
            for(let i=0; i<2000; i++) {
                ctx.fillStyle = i % 2 === 0 ? '#000' : '#4a2c1a';
                ctx.fillRect(Math.random() * 1024, 0, Math.random() * 2, 1024);
            }
            return new THREE.CanvasTexture(canvas);
        }

        function createMetalTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 512; canvas.height = 512;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#181817';
            ctx.fillRect(0, 0, 512, 512);
            ctx.globalAlpha = 0.05;
            for(let i=0; i<1000; i++) {
                ctx.fillStyle = '#fff';
                ctx.fillRect(0, Math.random() * 512, 512, 1);
            }
            return new THREE.CanvasTexture(canvas);
        }

        const woodTex = createWoodTexture();
        const metalTex = createMetalTexture();

        // --- MATERIALS ---
        const woodMat = new THREE.MeshStandardMaterial({ 
            map: woodTex, roughness: 0.25, metalness: 0.1, bumpScale: 0.02 
        });
        const chassisMat = new THREE.MeshStandardMaterial({ 
            map: metalTex, color: 0x111111, roughness: 0.4, metalness: 0.9 
        });
        const panelMat = new THREE.MeshStandardMaterial({ 
            color: 0x080808, roughness: 0.8, metalness: 0.2 
        });
        const glassMat = new THREE.MeshPhysicalMaterial({
            color: 0xffffff, metalness: 0.1, roughness: 0.05, transparency: 0.5, transparent: true
        });

        // --- GEOMETRY: THE UNIT ---
        const group = new THREE.Group();

        // Main Chassis
        const mainBox = new THREE.Mesh(new THREE.BoxGeometry(7, 5, 0.6), chassisMat);
        mainBox.castShadow = true;
        group.add(mainBox);

        // Wood Cheeks (V13.1 Rounded)
        const cheekGeo = new THREE.CapsuleGeometry(0.3, 5, 32, 32);
        const cl = new THREE.Mesh(cheekGeo, woodMat);
        cl.position.set(-3.6, 0, 0);
        group.add(cl);
        const cr = new THREE.Mesh(cheekGeo, woodMat);
        cr.position.set(3.6, 0, 0);
        group.add(cr);

        // Faceplates (Asymmetric V19)
        // Left Plate (Analysis)
        const leftPlate = new THREE.Mesh(new THREE.BoxGeometry(4.2, 4.4, 0.1), panelMat);
        leftPlate.position.set(-1.1, 0, 0.35);
        group.add(leftPlate);

        // Right Plate (Command)
        const rightPlate = new THREE.Mesh(new THREE.BoxGeometry(2.1, 4.4, 0.1), panelMat);
        rightPlate.position.set(2.2, 0, 0.35);
        group.add(rightPlate);

        // Emissive Screen (CRT)
        const crtGeo = new THREE.PlaneGeometry(3.8, 2.5);
        const crtMat = new THREE.MeshStandardMaterial({ 
            color: 0x000000, emissive: 0x33ff33, emissiveIntensity: 0.05 
        });
        const crt = new THREE.Mesh(crtGeo, crtMat);
        crt.position.set(-1.1, 0.8, 0.41);
        group.add(crt);

        // Nixie Glass
        const nixieGlass = new THREE.Mesh(new THREE.BoxGeometry(1.8, 1.2, 0.05), glassMat);
        nixieGlass.position.set(2.2, -0.8, 0.42);
        group.add(nixieGlass);

        // Knobs (Detailed)
        function createKnob(x, y) {
            const k = new THREE.Group();
            const base = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.22, 0.15, 32), chassisMat);
            const cap = new THREE.Mesh(new THREE.CylinderGeometry(0.18, 0.18, 0.05, 32), new THREE.MeshStandardMaterial({color:0x000000, roughness:0.1}));
            cap.position.y = 0.1;
            const pointer = new THREE.Mesh(new THREE.BoxGeometry(0.02, 0.02, 0.1), new THREE.MeshBasicMaterial({color:0xffffff}));
            pointer.position.set(0, 0.11, -0.1);
            k.add(base); k.add(cap); k.add(pointer);
            k.rotation.x = Math.PI/2;
            k.position.set(x, y, 0.45);
            return k;
        }
        group.add(createKnob(1.8, 0.8));
        group.add(createKnob(2.6, 0.8));

        scene.add(group);

        // --- STUDIO LIGHTING ---
        const keyLight = new THREE.SpotLight(0xffffff, 50);
        keyLight.position.set(5, 8, 10);
        keyLight.angle = 0.3;
        keyLight.penumbra = 0.5;
        keyLight.castShadow = true;
        scene.add(keyLight);

        const fillLight = new THREE.RectAreaLight(0x4488ff, 5, 10, 10);
        fillLight.position.set(-8, 2, 5);
        fillLight.lookAt(0,0,0);
        scene.add(fillLight);

        const rimLight = new THREE.PointLight(0xffffff, 20);
        rimLight.position.set(0, 5, -5);
        scene.add(rimLight);

        const bottomLight = new THREE.RectAreaLight(0xffffff, 2, 20, 2);
        bottomLight.position.set(0, -3, 5);
        bottomLight.lookAt(0,0,0);
        scene.add(bottomLight);

        // Reflection Floor
        const floor = new THREE.Mesh(
            new THREE.PlaneGeometry(100, 100),
            new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.1, metalness: 0.5 })
        );
        floor.rotation.x = -Math.PI/2;
        floor.position.y = -4;
        floor.receiveShadow = true;
        scene.add(floor);

        // --- ANIMATION LOOP ---
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
