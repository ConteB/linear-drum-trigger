<!DOCTYPE html>
<html>
<head>
    <title>OP-NEUROTRIGGER V25 // MASTER RECOVERY</title>
    <style>
        body { margin: 0; background: #d0d0d0; overflow: hidden; font-family: 'Helvetica', sans-serif; }
        #overlay { position: absolute; bottom: 30px; width: 100%; text-align: center; color: #444; font-size: 10px; letter-spacing: 5px; text-transform: uppercase; }
    </style>
</head>
<body>
    <div id="overlay">Linear Division // OP-NeuroTrigger // V25 High-Fidelity Render</div>
    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
    </script>
    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xd0d0d0);
        const camera = new THREE.PerspectiveCamera(25, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 2, 18);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.shadowMap.enabled = true;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.2;
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        // --- MATERIALS ---
        const woodMat = new THREE.MeshPhysicalMaterial({ color: 0x3d2212, roughness: 0.2, metalness: 0, clearcoat: 1.0 });
        const metalMat = new THREE.MeshPhysicalMaterial({ color: 0x1a1a1a, metalness: 0.9, roughness: 0.3 });
        const panelMat = new THREE.MeshPhysicalMaterial({ color: 0x0a0a0a, roughness: 0.8, metalness: 0.1 });
        const screenMat = new THREE.MeshStandardMaterial({ color: 0x000000, emissive: 0x33ff33, emissiveIntensity: 0.1 });
        const nixieMat = new THREE.MeshStandardMaterial({ color: 0x000000, emissive: 0xff7700, emissiveIntensity: 1.5 });

        const unit = new THREE.Group();

        // 1. MAIN CHASSIS
        const body = new THREE.Mesh(new THREE.BoxGeometry(8, 5.5, 0.6), metalMat);
        body.castShadow = true;
        unit.add(body);

        // Cheeks
        const cheekGeo = new THREE.CapsuleGeometry(0.35, 5.6, 32, 32);
        const cl = new THREE.Mesh(cheekGeo, woodMat); cl.position.set(-4.1, 0, 0); unit.add(cl);
        const cr = new THREE.Mesh(cheekGeo, woodMat); cr.position.set(4.1, 0, 0); unit.add(cr);

        // 2. ASYMMETRIC PLATES (V19)
        const leftPlate = new THREE.Mesh(new THREE.BoxGeometry(4.6, 5.1, 0.1), panelMat);
        leftPlate.position.set(-1.4, 0, 0.35); unit.add(leftPlate);

        const rightPlate = new THREE.Mesh(new THREE.BoxGeometry(2.4, 5.1, 0.1), panelMat);
        rightPlate.position.set(2.4, 0, 0.35); unit.add(rightPlate);

        // 3. COMPONENTS
        // CRT Screen
        const scope = new THREE.Mesh(new THREE.PlaneGeometry(4.2, 2.8), screenMat);
        scope.position.set(-1.4, 0.9, 0.41); unit.add(scope);

        // Edgewise Meter
        const meter = new THREE.Mesh(new THREE.BoxGeometry(2.0, 0.4, 0.05), new THREE.MeshStandardMaterial({color:0x000000}));
        meter.position.set(2.4, 2.1, 0.41); unit.add(meter);

        // Knobs
        const kGeo = new THREE.CylinderGeometry(0.25, 0.25, 0.15, 32);
        const k1 = new THREE.Mesh(kGeo, metalMat); k1.rotation.x = Math.PI/2; k1.position.set(1.9, 1.3, 0.45); unit.add(k1);
        const k2 = new THREE.Mesh(kGeo, metalMat); k2.rotation.x = Math.PI/2; k2.position.set(2.9, 1.3, 0.45); unit.add(k2);

        // Neural Slot
        const slot = new THREE.Mesh(new THREE.BoxGeometry(2.1, 0.7, 0.05), nixieMat);
        slot.position.set(2.4, -0.6, 0.41); unit.add(slot);

        scene.add(unit);

        // --- LIGHTING ---
        const ambient = new THREE.AmbientLight(0xffffff, 0.5); scene.add(ambient);
        const light1 = new THREE.DirectionalLight(0xffffff, 2); light1.position.set(5, 10, 10); light1.castShadow = true; scene.add(light1);
        const light2 = new THREE.DirectionalLight(0xffffff, 1); light2.position.set(-5, 5, 5); scene.add(light2);
        const rim = new THREE.PointLight(0xffffff, 20); rim.position.set(0, 5, -5); scene.add(rim);

        // Studio Floor
        const floor = new THREE.Mesh(new THREE.PlaneGeometry(100, 100), new THREE.MeshStandardMaterial({color:0xd0d0d0, roughness:0.2}));
        floor.rotation.x = -Math.PI/2; floor.position.y = -5; scene.add(floor);

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
