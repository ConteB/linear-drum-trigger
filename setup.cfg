# OP-NEUROTRIGGER — mutation-testing configuration (F0-T9b).
# mutmut is the Layer-0 meta-gate of the Testing Doctrine: it injects bugs
# (mutants) into the pipeline code and counts how many the suite kills.
#
# Kill-rate gate (TESTING_DOCTRINE §3) — applied as DoD of F0-T2b/c/d:
#   critical modules (recipe.py, dna_trace.py, gold_writer.py): >= 90 %
#   core modules     (mic_standardize.py):                      >= 85 %
# A surviving mutant must be KILLED (a test added) or justified in writing as
# an equivalent mutant — never ignored.
#
# EXECUTION PLATFORM — Linux. mutmut 3.x forces multiprocessing 'fork'; a
# forked child that has loaded macOS-native libraries (numpy BLAS, libsndfile)
# segfaults on macOS. The gate is therefore run inside the OrbStack Ubuntu
# machine, where fork is safe. See tools/run_mutation.sh.
#
# The real-engine acceptance tests (tests/acceptance/ — Sfizz/DrumGizmo CLI)
# are excluded: they need a platform-matched render binary and are not part of
# the data-contract meta-gate. The portable fake-binary tests stay in scope.

[mutmut]
paths_to_mutate = src/data_engineering/gold/
tests_dir = tests/
pytest_add_cli_args =
    --ignore=tests/acceptance
