# lychee.toml — validatore di link della documentazione
# OP-NEUROTRIGGER Doc Standard (LIN-DT-DOCSTD-001, sezione "validator").
#
# Invocazione:
#   lychee --offline .   # valida SOLO link e ancore interni (no rete)
#   lychee .             # valida anche le URL esterne
#
# Gate BLOCKING: il pre-commit hook (tools/pre-commit) esegue lychee --offline —
# un link o un'ancora rotti fanno fallire il commit.

# Verifica le ancore/frammenti (#sezione), non solo l'esistenza del file.
# In lychee 0.24 il valore e' una stringa: anchor-only | text-only | full | none.
include_fragments = "anchor-only"

# Path esclusi dalla scansione.
exclude_path = [
  ".git",
  "data",
]

# URL esterne note-buone ma lente/instabili: si accettano questi status.
accept = ["200", "429"]

max_concurrency = 8
