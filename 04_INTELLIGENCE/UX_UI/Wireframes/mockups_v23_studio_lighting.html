<!DOCTYPE html>
<html>
<head>
    <title>OP-NEUROTRIGGER V23 // STUDIO LIGHTING</title>
    <style>
        body { margin: 0; background: #222; overflow: hidden; font-family: 'Helvetica', sans-serif; }
        #ui-info { position: absolute; top: 30px; left: 30px; color: #666; font-size: 9px; letter-spacing: 3px; text-transform: uppercase; pointer-events: none; }
    </style>
</head>
<body>
    <div id="ui-info">Linear Division // V23 Studio Photography // Layout: Asymmetric V19</div>
    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
    </script>
    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x2a2a2a);
        scene.fog = new THREE.Fog(0x2a2a2a, 10, 30);

        const camera = new THREE.PerspectiveCamera(22, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(6, 4, 16);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.shadowMap.enabled = true;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.4;
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        // --- MATERIALS (REFINED FOR LIGHT) ---
        const woodMat = new THREE.MeshStandardMaterial({ color: 0x4a2c1a, roughness: 0.35, metalness: 0.1 });
        const metalMat = new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.3, metalness: 0.8 });
        const panelMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.7, metalness: 0.1 });
        const screenMat = new THREE.MeshStandardMaterial({ color: 0x050505, emissive: 0x33ff33, emissiveIntensity: 0.05 });
        const nixieMat = new THREE.MeshStandardMaterial({ color: 0x000000, emissive: 0xff7700, emissiveIntensity: 1.5 });

        // --- UNIT GROUP ---
        const unit = new THREE.Group();

        // 1. CHASSIS
        const mainBox = new THREE.Mesh(new THREE.BoxGeometry(8, 5.5, 0.6), metalMat);
        mainBox.receiveShadow = true;
        unit.add(mainBox);

        // Wood Cheeks (V13.1 Rounded)
        const cheekGeo = new THREE.CapsuleGeometry(0.35, 5.6, 32, 32);
        const cl = new THREE.Mesh(cheekGeo, woodMat); cl.position.set(-4.1, 0, 0); cl.castShadow = true; unit.add(cl);
        const cr = new THREE.Mesh(cheekGeo, woodMat); cr.position.set(4.1, 0, 0); cr.castShadow = true; unit.add(cr);

        // 2. LEFT BLOCK (ANALYSIS)
        const leftPlate = new THREE.Mesh(new THREE.BoxGeometry(4.6, 5.1, 0.1), panelMat);
        leftPlate.position.set(-1.4, 0, 0.35);
        unit.add(leftPlate);
        
        const scope = new THREE.Mesh(new THREE.PlaneGeometry(4.2, 2.8), screenMat);
        scope.position.set(-1.4, 0.9, 0.41);
        unit.add(scope);

        for(let i=0; i<8; i++) {
            const strip = new THREE.Mesh(new THREE.BoxGeometry(0.45, 1.8, 0.05), panelMat);
            strip.position.set(-3.0 + (i * 0.45), -1.5, 0.41);
            unit.add(strip);
        }

        // 3. RIGHT STACK
        const rightPlate = new THREE.Mesh(new THREE.BoxGeometry(2.4, 5.1, 0.1), panelMat);
        rightPlate.position.set(2.4, 0, 0.35);
        unit.add(rightPlate);

        // Edgewise Meter
        const meter = new THREE.Mesh(new THREE.BoxGeometry(2.0, 0.4, 0.02), new THREE.MeshStandardMaterial({color:0x050505}));
        meter.position.set(2.4, 2.1, 0.41);
        unit.add(meter);
        const needle = new THREE.Mesh(new THREE.BoxGeometry(0.02, 0.35, 0.02), new THREE.MeshBasicMaterial({color:0xff0000}));
        needle.position.set(2.8, 2.1, 0.43);
        unit.add(needle);

        // Knobs
        const k1 = new THREE.Mesh(new THREE.CylinderGeometry(0.25, 0.25, 0.15, 32), metalMat);
        k1.rotation.x = Math.PI/2; k1.position.set(1.9, 1.3, 0.45); unit.add(k1);
        const k2 = new THREE.Mesh(new THREE.CylinderGeometry(0.25, 0.25, 0.15, 32), metalMat);
        k2.rotation.x = Math.PI/2; k2.position.set(2.9, 1.3, 0.45); unit.add(k2);

        // Neural Slot (Middle)
        const slot = new THREE.Mesh(new THREE.BoxGeometry(2.1, 0.7, 0.05), nixieMat);
        slot.position.set(2.4, -0.6, 0.41);
        unit.add(slot);

        // Owner Plate (Bottom)
        const plate = new THREE.Mesh(new THREE.BoxGeometry(2.0, 0.4, 0.02), metalMat);
        plate.position.set(2.4, -2.1, 0.41);
        unit.add(plate);

        scene.add(unit);

        // --- STUDIO LIGHTING (POWERFUL) ---
        const ambient = new THREE.AmbientLight(0xffffff, 0.8);
        scene.add(ambient);

        const topLight = new THREE.DirectionalLight(0xffffff, 3);
        topLight.position.set(0, 10, 5);
        topLight.castShadow = true;
        scene.add(topLight);

        const keyLight = new THREE.SpotLight(0xffffff, 100);
        keyLight.position.set(10, 5, 10);
        keyLight.angle = 0.5;
        keyLight.castShadow = true;
        scene.add(keyLight);

        const backLight = new THREE.PointLight(0xffffff, 20);
        backLight.position.set(-5, 5, -5);
        scene.add(backLight);

        // Floor
        const floor = new THREE.Mesh(new THREE.PlaneGeometry(100, 100), new THREE.MeshStandardMaterial({color:0x1a1a1a, roughness:0.2}));
        floor.rotation.x = -Math.PI/2; floor.position.y = -5; floor.receiveShadow = true;
        scene.add(floor);

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
